name: Publish softwarity/polyglot to NPM
run-name: ${{ github.actor }} publish ${{ github.ref_name }} on ${{ github.repository }}
on:
  push:
    tags:
      - '*'

# id-token: write is required for npm provenance (--provenance).
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Smoke test
        run: npm test
      - name: Guard — tag must match package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG_VERSION — tag: $TAG"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match package.json version '$PKG_VERSION'."
            exit 1
          fi
      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
