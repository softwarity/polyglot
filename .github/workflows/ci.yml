name: CI
run-name: ${{ github.actor }} run CI on ${{ github.repository }}
on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - main
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build doc-site
        working-directory: docs
        run: |
          npm ci
          npm run build -- --base-href /polyglot/
